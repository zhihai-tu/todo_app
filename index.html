<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项 - Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <header>
                <h1>
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 11l3 3L22 4"></path>
                        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"></path>
                    </svg>
                    我的待办事项
                </h1>
                <p class="subtitle">高效管理你的每一天</p>
            </header>

            <div class="input-section">
                <input
                    type="text"
                    id="todoInput"
                    placeholder="添加新的待办事项..."
                    maxlength="100"
                >
                <button id="addBtn" class="add-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    添加
                </button>
            </div>

            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">
                    全部 <span class="count" id="allCount">0</span>
                </button>
                <button class="filter-btn" data-filter="active">
                    进行中 <span class="count" id="activeCount">0</span>
                </button>
                <button class="filter-btn" data-filter="completed">
                    已完成 <span class="count" id="completedCount">0</span>
                </button>
            </div>

            <ul id="todoList" class="todo-list"></ul>

            <div class="empty-state" id="emptyState">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                    <line x1="9" y1="9" x2="9.01" y2="9"></line>
                    <line x1="15" y1="9" x2="15.01" y2="9"></line>
                </svg>
                <p>暂无待办事项</p>
                <p class="empty-hint">添加一个新任务开始吧！</p>
            </div>

            <footer class="app-footer">
                <button id="clearCompleted" class="clear-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path>
                    </svg>
                    清除已完成
                </button>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
